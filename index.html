<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GhostChat - Chat anónimo seguro">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GhostChat">
  <meta name="theme-color" content="#8A2BE2">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">
  
  <title>GhostChat</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #090909;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    #loading {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #090909 0%, #1a1a2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
    }
    
    .ghost-icon {
      font-size: 80px;
      animation: float 2s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(138, 43, 226, 0.2);
      border-top-color: #8A2BE2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 30px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      color: #8A2BE2;
      margin-top: 20px;
      font-size: 18px;
      font-weight: 500;
    }
    
    .loading-subtitle {
      color: #666;
      margin-top: 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  
  <!-- Loading Screen -->
  <div id="loading">
    <div class="ghost-icon">👻</div>
    <div class="spinner"></div>
    <div class="loading-text">GhostChat</div>
    <div class="loading-subtitle">Conectando de forma segura...</div>
  </div>

  <!-- ============ FIREBASE SDK ============ -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  
  <script>
    // ============ CONFIGURACIÓN FIREBASE ============
    // 🔥 REEMPLAZA CON TUS CREDENCIALES DE FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyBgPt2RFwc2o6rgC2II-cwJ_0J-TyO0eLg",
      authDomain: "studio-979184038-173c2.firebaseapp.com",
      projectId: "studio-979184038-173c2",
      storageBucket: "studio-979184038-173c2.firebasestorage.app",
      messagingSenderId: "276076090787",
      appId: "1:276076090787:web:5c9f7ab3b441c9d0d93616"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);

    // Variables globales para Flutter
    window.firebaseMessaging = null;
    window.fcmToken = null;
    window.notificationPermission = 'default';

    // Inicializar Messaging si está soportado
    if ('Notification' in window && 'serviceWorker' in navigator) {
      navigator.serviceWorker.register('firebase-messaging-sw.js')
        .then((registration) => {
          console.log('✅ Service Worker registrado');
          
          window.firebaseMessaging = firebase.messaging();
          window.firebaseMessaging.useServiceWorker(registration);
          
          // Solicitar permisos
          Notification.requestPermission().then((permission) => {
            window.notificationPermission = permission;
            console.log('📬 Permiso de notificaciones:', permission);
            
            if (permission === 'granted') {
              // Obtener token FCM
              window.firebaseMessaging.getToken({
                vapidKey: 'BJyOqkC6hvuUbwyQ7XIaODqBnu6nzQRTJisQe-ppZF10crJEeRmrJHkG4_zB97K0tm6xd8_Q-799RxyPgHRgc84'  // 🔥 REEMPLAZAR
              }).then((token) => {
                window.fcmToken = token;
                console.log('🔑 Token FCM:', token);
              }).catch((err) => {
                console.error('Error obteniendo token:', err);
              });
              
              // Escuchar mensajes en foreground
              window.firebaseMessaging.onMessage((payload) => {
                console.log('📩 Mensaje recibido:', payload);
                showNotification(payload);
              });
            }
          });
        })
        .catch((err) => {
          console.error('❌ Error registrando SW:', err);
        });
    }

    // Mostrar notificación
    function showNotification(payload) {
      const title = payload.notification?.title || 'GhostChat';
      const options = {
        body: payload.notification?.body || 'Nuevo mensaje',
        icon: 'icons/Icon-192.png',
        badge: 'icons/Icon-192.png',
        vibrate: [200, 100, 200],
        tag: payload.data?.chat_id || 'ghostchat',
        requireInteraction: false,
        data: payload.data
      };

      new Notification(title, options);
    }

    // Funciones para Flutter
    window.getFCMToken = function() {
      return window.fcmToken || null;
    };

    window.getNotificationPermission = function() {
      return window.notificationPermission;
    };

    window.requestNotificationPermission = async function() {
      const permission = await Notification.requestPermission();
      window.notificationPermission = permission;
      return permission;
    };

    window.showLocalNotification = function(title, body, chatId) {
      if (Notification.permission === 'granted') {
        new Notification(title, {
          body: body,
          icon: 'icons/Icon-192.png',
          tag: chatId || 'ghostchat'
        });
      }
    };
  </script>

  <script>
    // Ocultar loading cuando Flutter esté listo
    window.addEventListener('flutter-first-frame', function() {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.transition = 'opacity 0.5s ease-out';
        loading.style.opacity = '0';
        setTimeout(() => loading.remove(), 500);
      }
    });

    // Fallback por si el evento no se dispara
    setTimeout(function() {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.transition = 'opacity 0.5s ease-out';
        loading.style.opacity = '0';
        setTimeout(() => loading.remove(), 500);
      }
    }, 5000);
  </script>

  <!-- Flutter Bootstrap -->
  <script src="flutter_bootstrap.js" async></script>
  
</body>
</html>
