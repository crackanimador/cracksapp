<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>GhostChat</title>

    <!-- Para que Flutter Web funcione correctamente en la raíz del dominio -->
    <base href="/" />

    <meta name="description" content="GhostChat - Chat con cifrado híbrido propio" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Colores del tema -->
    <meta name="theme-color" content="#090909" />

    <!-- Manifiesto PWA (si lo usas) -->
    <link rel="manifest" href="manifest.json" />

    <!-- Iconos -->
    <link rel="icon" type="image/png" href="icons/Icon-192.png" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Fuente por defecto de Flutter Web -->
    <link rel="stylesheet" href="flutterfonts.css" />

    <!-- IMPORTANTE: deshabilitar el service worker de Flutter -->
    <script>
      // Desactivamos el service worker incorporado de Flutter:
      // Si serviceWorkerVersion es null, flutter.js NO registra flutter_service_worker.js
      const serviceWorkerVersion = "2559989002" /* Flutter's service worker is deprecated and will be removed in a future Flutter release. */;

      // Además, desregistramos cualquier SW viejo que pueda estar causando bucles
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker
          .getRegistrations()
          .then(function (registrations) {
            for (var i = 0; i < registrations.length; i++) {
              registrations[i].unregister();
            }
          })
          .catch(function (err) {
            console.log('Error desregistrando service workers:', err);
          });
      }
    </script>

    <!-- Bootstrap de Flutter Web -->
    <script src="flutter.js" defer></script>
  </head>

  <body>
    <!-- Contenedor principal de Flutter -->
    <script>
      window.addEventListener('load', function (ev) {
        // Esta función la define flutter.js y arranca la app
        _flutter
          .loader()
          .then(function (engineInitializer) {
            return engineInitializer.initializeEngine();
          })
          .then(function (appRunner) {
            return appRunner.runApp();
          });
      });
    </script>
  </body>
</html>
