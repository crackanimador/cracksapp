<!DOCTYPE html>
<html>
<head>
  <!-- Base para Flutter Web -->
  <base href="/">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="description" content="GhostChat - Chat anónimo seguro">

  <!-- Viewport y PWA -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GhostChat">
  <meta name="theme-color" content="#8A2BE2">
  <meta name="format-detection" content="telephone=no">

  <!-- Iconos y manifest -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>GhostChat</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: #090909;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #090909 0%, #1a1a2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }

    .ghost-icon {
      font-size: min(80px, 20vw);
      animation: float 2s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .spinner {
      width: min(50px, 15vw);
      height: min(50px, 15vw);
      border: 4px solid rgba(138, 43, 226, 0.2);
      border-top-color: #8A2BE2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: #8A2BE2;
      font-size: clamp(16px, 5vw, 24px);
      font-weight: 500;
      text-align: center;
      padding: 0 20px;
    }

    .loading-subtitle {
      color: #666;
      margin-top: 10px;
      font-size: clamp(12px, 3vw, 14px);
      text-align: center;
      padding: 0 20px;
    }

    .error-message {
      color: #ff4444;
      margin-top: 20px;
      font-size: 14px;
      text-align: center;
      display: none;
      padding: 0 20px;
    }

    #flutter-container {
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.3s ease-in;
    }

    #flutter-container.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- Pantalla de carga -->
  <div id="loading">
    <div class="ghost-icon">👻</div>
    <div class="spinner"></div>
    <div class="loading-text">GhostChat</div>
    <div class="loading-subtitle">Conectando de forma segura...</div>
    <div class="error-message" id="error-message"></div>
  </div>

  <!-- Contenedor donde Flutter inyecta la app -->
  <div id="flutter-container"></div>

  <script>
    // Ocultar loading cuando Flutter pinta el primer frame
    window.addEventListener('flutter-first-frame', () => {
      const loading = document.getElementById('loading');
      const container = document.getElementById('flutter-container');

      if (loading) {
        loading.style.opacity = '0';
        setTimeout(() => {
          loading.style.display = 'none';
          if (container) {
            container.classList.add('visible');
          }
        }, 300);
      }
    });

    // Timeout de seguridad (por si flutter-first-frame no se dispara por algún motivo)
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loading = document.getElementById('loading');
        const container = document.getElementById('flutter-container');
        if (loading && loading.style.display !== 'none') {
          loading.style.opacity = '0';
          setTimeout(() => {
            loading.style.display = 'none';
            if (container) {
              container.classList.add('visible');
            }
          }, 300);
        }
      }, 5000);
    });
  </script>

  <!-- Arranca Flutter Web -->
  <script src="flutter_bootstrap.js" defer></script>
</body>
</html>
